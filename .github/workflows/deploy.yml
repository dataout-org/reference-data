name: Deploy to dataout.org

on:
  push:
    branches: [main]
    paths:
      - 'legal-ru/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Validate deploy secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          test -n "$DEPLOY_HOST" || (echo "Missing secret: DEPLOY_HOST" && exit 1)
          test -n "$DEPLOY_USER" || (echo "Missing secret: DEPLOY_USER" && exit 1)
          test -n "$DEPLOY_KEY" || (echo "Missing secret: DEPLOY_KEY" && exit 1)
          test -n "$DEPLOY_PATH" || (echo "Missing secret: DEPLOY_PATH" && exit 1)

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy files via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          # port: ${{ secrets.DEPLOY_PORT }}   # add if non-default
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            rsync -avz --delete ~/reps/dataout-org/reference-data/legal-ru/ ./